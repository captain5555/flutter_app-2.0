workflows:
  ios:
    name: iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 90
    environment:
      flutter: 3.16.9
      cocoapods: 1.14.3
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Show versions
        script: |
          flutter --version
          xcodebuild -version
          pod --version
      - name: Clean
        script: |
          flutter clean
          rm -rf ios/Pods ios/Podfile.lock
      - name: Get dependencies
        script: |
          flutter pub get
      - name: Pod install
        script: |
          cd ios
          pod install
      - name: Build iOS (with git restore)
        script: |
          # First build - allow Flutter to upgrade project (will probably fail)
          flutter build ios --release --no-codesign || true
          # Restore the original iOS project files that Flutter may have modified
          git checkout HEAD -- ios/Runner.xcodeproj/project.pbxproj || true
          git checkout HEAD -- ios/Runner.xcodeproj/xcshareddata/xcschemes/Runner.xcscheme || true
          git checkout HEAD -- ios/Flutter/Debug.xcconfig || true
          git checkout HEAD -- ios/Flutter/Release.xcconfig || true
          git checkout HEAD -- ios/Flutter/Generated.xcconfig || true
          # Second build - with original project files
          flutter build ios --release --no-codesign
      - name: Create IPA
        script: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r build/ios/Runner.ipa Payload/
    artifacts:
      - build/ios/Runner.ipa
